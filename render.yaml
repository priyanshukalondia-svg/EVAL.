# render.yaml
# Render Blueprint configuration to deploy the FastAPI backend service

services:
  - type: web
    name: eval-api
    env: python
    
    # Navigate to backend directory and install dependencies
    buildCommand: "cd apps/api && pip install -r requirements.txt"
    
    # Start the FastAPI server using uvicorn on the assigned port
    startCommand: "cd apps/api && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
        
      # These environment keys should be supplied in the Render Settings UI
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
